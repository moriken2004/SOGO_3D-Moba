}
function spawnSquid() {
  const target = Math.min(4, Math.floor(stones.length / 5));
  if (squids.length >= target) return;
  const s = createSquid();
  scene.add(s); squids.push(s);
}
function updateSquid(time) {
  for (const s of squids) {
    const d = s.userData;
    d.angle += d.speed;
    s.position.set(1.5 + Math.cos(d.angle) * d.radius, d.height + Math.sin(time * 0.5 + d.bob) * 0.25, 1.5 + Math.sin(d.angle) * d.radius);
    s.rotation.y = -d.angle + (d.speed > 0 ? -Math.PI / 2 : Math.PI / 2);  // head (+X) leads
    s.rotation.z = Math.sin(time * 0.6 + d.ph) * 0.05;                      // gentle roll
    // fins: free margin sweeps down + a travelling wave (head→tail), growing toward the margin and the rear
    const p = d.finGeo.attributes.position;
    for (let i = 0; i < p.count; i++) {
      const x = p.getX(i), z = p.getZ(i), az = Math.abs(z);
      const inner = sqMantleRX(x);
      const margin = Math.min(1, Math.max(0, (az - inner) / SQ_FIN.w));
      const rearBoost = 0.55 + 0.45 * ((SQ_FIN.x1 - x) / (SQ_FIN.x1 - SQ_FIN.x0));
      const droop = -margin * margin * SQ_FIN.dihedral;
      const rest = Math.sin(x * 3.0 + (z > 0 ? 0 : Math.PI)) * 0.018 * margin;
      const wave = Math.sin(x * SQ_FIN.waveLen - time * SQ_FIN.waveSpeed + d.ph) * SQ_FIN.waveAmp * margin * rearBoost;
      p.setY(i, droop + rest + wave);
    }
    p.needsUpdate = true; d.finGeo.computeVertexNormals();
    d.arms.rotation.x = Math.sin(time * 1.0 + d.ph) * 0.08;
    d.arms.rotation.z = Math.sin(time * 0.7 + d.ph + 1) * 0.05;
    if (d.fadeT < 1) { d.fadeT = Math.min(1, d.fadeT + 0.012); for (const fm of d.fadeMats) fm.m.opacity = d.fadeT * fm.o; }
  }
}
// Squid appear as the reef grows (~1 per 5 cages, up to 4)
setInterval(() => { if (theme === 'seaweed' && !titleAnimation && !resetAnimState) spawnSquid(); }, 4200);

// === Disposal helpers — release GPU buffers / shader programs that Three.js holds. ===
// Without these, every game restart leaks per-instance cloned geometries and materials
// (fish: cloned lathe geo + MeshStandardMaterial, squid: 4 mats + finGeo, kelp: merged geo,
// cage: cloned rubbleMat, marble: new SphereGeometry + MeshPhysicalMaterial, UUV: cloned
// body mat + beam shader mat + lamp mat). JS GC frees the wrapper objects but the WebGL
// resources stay allocated until dispose() is called.
function disposeMaterial(m) {
  if (!m) return;
  if (Array.isArray(m)) { for (const mi of m) mi && mi.dispose && mi.dispose(); }
  else if (m.dispose) m.dispose();
}
function disposeFish(f) {
  if (f.geometry) f.geometry.dispose();                                   // cloned per fish
  disposeMaterial(f.material);                                            // cloned per fish
}
function disposeSquid(s) {
  // userData.finGeo + fadeMats list per-instance resources. Other geos (mantle/head/arms/eye/iris)
  // are shared module-level → leave them alone.
  const u = s.userData || {};
  if (u.finGeo && u.finGeo.dispose) u.finGeo.dispose();
  if (Array.isArray(u.fadeMats)) for (const fm of u.fadeMats) disposeMaterial(fm.m);
}
function disposeKelp(k) {
  // Per-kelp geometries: stipe CylinderGeometry + crown mergeGeometries.
  // Materials (stipeMat, kajimeBladeMats[i]) are SHARED module-level → don't dispose.
  k.traverse(child => {
    if (child.geometry && child.geometry !== holdfastGeo) child.geometry.dispose();
  });
}
function disposeUUV(u) {
  // u.material was cloned via uuvMat.clone(); beam/lamp materials cloned similarly.
  // uuvGeo + beamConeGeo + lampGeo are shared module-level.
  disposeMaterial(u.material);
  const d = u.userData || {};
  if (d.beamMat) disposeMaterial(d.beamMat);
  if (d.lampMat) disposeMaterial(d.lampMat);
}
function disposeStone(s) {
  // Cage: rubble material is cloned per cage (RUBBLE_FRESH colour). Frame material is shared.
  // Marble: BOTH the SphereGeometry and the MeshPhysicalMaterial are created per addStone.
  const u = s.userData || {};
  if (u.rubbleMat) {
    disposeMaterial(u.rubbleMat);
  } else if (s.geometry && s.material && !s.userData?.rubbleMat) {
    // Plain Mesh marble (normal theme): dispose both.
    if (s.geometry) s.geometry.dispose();
    disposeMaterial(s.material);
  }
}
function clearReefEffects() {
  for (const b of bubbles) scene.remove(b);                               // bubbles share bubbleGeo + bubbleMat → no dispose
  bubbles.length = 0;
  for (const k of seaweeds) { scene.remove(k); disposeKelp(k); }
  seaweeds.length = 0;
  for (const f of fishes)   { scene.remove(f); disposeFish(f); }
  fishes.length = 0;
  for (const u of uuvs)     { scene.remove(u); disposeUUV(u); }
  uuvs.length = 0;
  for (const s of squids)   { scene.remove(s); disposeSquid(s); }
  squids.length = 0;
}

// Periodic fish spawning — a small school from the start, growing as the reef fills
setInterval(() => {
  if (theme === 'seaweed' && !titleAnimation && !resetAnimState) {
    if (fishes.length < Math.min(30, 3 + stones.length * 2)) spawnFish();
  }
}, 1400);

function animate() {
  requestAnimationFrame(animate);
  if (theme === 'seaweed') {
    const time = performance.now() * 0.001;
    updateBubbles();
    updateSeaweed(time);
    updateFish(time);
    updateUUV(time);
    updateSquid(time);
    updateMarineSnow(time);
    updateGodRays(time);
    ageRubble(time);
    causticMat.uniforms.uTime.value = time;
    surface.rotation.y += 0.0006;                          // slow shimmer of the surface caustics
    surface.material.opacity = 0.52 + Math.sin(time * 0.5) * 0.1;
    // Barnacles slowly colonize the concrete (~70s to full)
    if (barnacleGrowth < 1) { barnacleGrowth = Math.min(1, barnacleGrowth + 0.00024); barnacleMat.opacity = barnacleGrowth * 0.9; }
    // Subtle caustic shimmer on the key light
    dirLight.intensity = causticBase + Math.sin(time * 1.7) * 0.08 + Math.sin(time * 3.3) * 0.04;
  }
  if (resetAnimState) {
    tickResetAnim();
  }
  if (titleAnimation) {
    titleAnimAngle += 0.0028;
    const r = theme === 'seaweed' ? 7 : 11; // closer underwater so the reef shows through the murk
    camera.position.x = 1.5 + r * Math.cos(titleAnimAngle);
    camera.position.z = 1.5 + r * Math.sin(titleAnimAngle);
    camera.position.y = 5.5 + 1.6 * Math.sin(titleAnimAngle * 0.6);
    camera.lookAt(1.5, 1.5, 1.5);
  } else if (cameraAnim) {
    tickCameraAnim();
  } else {
    clampCameraToSeabed();
    controls.update();
  }
  composer.render();
}
animate();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

// === 磯 (tide-pool) title decorations: real-photo cut-outs (barnacles, anemones, walking hermit crab) ===
(function setupTidepoolDecor() {
  const card = document.querySelector('.title-card');
  if (!card) return;

  const decor = document.createElement('div');
  decor.className = 'iso-decor'; decor.setAttribute('aria-hidden', 'true');
  // the panel image already has encrustation (anemones, mussels, moss) baked in — only the crab is dynamic

  // hermit crab — photo cut-out (out + withdrawn) that walks the top rim
  const crab = document.createElement('div');
  crab.className = 'hermit';
  crab.innerHTML = '<div class="crab-bob"><img class="crab-out" src="assets/crab_full.png?v=userpair" alt=""><img class="crab-in" src="assets/crab_tuck.png?v=userpair" alt=""></div>';
  decor.appendChild(crab);
  card.appendChild(decor);

  let cx = 80, cdir = 1, paused = false, cLast = 0;
  function crabFrame(ts) {
    requestAnimationFrame(crabFrame);
    const dt = cLast ? Math.min(0.05, (ts - cLast) / 1000) : 0; cLast = ts;
    if (titleAnimation && document.body.classList.contains('sea-ui') && !paused) {
      const maxX = Math.max(30, card.clientWidth - 118); // 110px box + 8px right margin
      cx += 24 * dt * cdir;                              // ~24 px/sec, frame-rate independent
      if (cx <= 8) { cx = 8; cdir = 1; } else if (cx >= maxX) { cx = maxX; cdir = -1; }
      crab.style.left = cx + 'px';
      crab.style.transform = 'scaleX(' + cdir + ')';     // face the walking direction
    }
  }
  requestAnimationFrame(crabFrame);

  // click → withdraw into the shell (crossfade to the shell-only photo), then re-emerge
  crab.addEventListener('click', () => {
    if (crab.classList.contains('tucked')) return;
    crab.classList.add('tucked'); paused = true;
    setTimeout(() => { crab.classList.remove('tucked'); paused = false; if (Math.random() < 0.5) cdir *= -1; }, 1900);
  });
})();

updateStatus();
renderStats();
