<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>立体4目並べ</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; overflow: hidden; font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif; background: #1a1a2e; color: #fff; }
  button {
    background: #3a3a6a; color: #fff; border: none; padding: 6px 12px;
    border-radius: 5px; cursor: pointer; margin: 2px; font-size: 13px;
  }
  button:hover { background: #5a5a8a; }
  button.active { background: #e74c3c; }

  /* Title screen */
  #title-screen {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(5,5,12,0.78) 90%);
    display: flex; align-items: center; justify-content: center;
    overflow: auto; padding: 20px;
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .title-card {
    position: relative;
    background: rgba(10, 10, 22, 0.62);
    padding: 38px 44px 32px;
    border-radius: 18px; max-width: 460px; width: 100%;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 24px 70px rgba(0,0,0,0.65),
      0 0 80px rgba(231, 76, 60, 0.08),
      inset 0 1px 0 rgba(255,255,255,0.08);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    animation: cardEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(24px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .title-card h1 {
    margin: 0 0 4px 0; text-align: center;
    font-size: 36px; letter-spacing: 0.12em; font-weight: 800;
    background: linear-gradient(135deg, #ffe0a3 0%, #f5b76b 35%, #e07a3c 70%, #c64530 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    filter: drop-shadow(0 2px 12px rgba(255, 140, 60, 0.25));
  }
  .title-sub {
    text-align: center; color: #888; letter-spacing: 0.3em;
    font-size: 10px; margin-bottom: 22px; text-transform: uppercase;
  }
  .divider {
    height: 1px; margin: 0 0 22px 0;
    background: linear-gradient(90deg, transparent, rgba(231, 76, 60, 0.55), transparent);
  }
  #stats-display { margin-bottom: 18px; font-size: 12px; color: #aaa; }
  #stats-display:empty { display: none; }
  #stats-display .stats-title {
    font-size: 10px; color: #888; letter-spacing: 0.15em;
    margin-bottom: 6px; text-transform: uppercase;
  }
  #stats-display .stat-row {
    display: flex; justify-content: space-between;
    padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  #stats-display .stat-row span:first-child {
    color: #d0d0d0; font-weight: 600; min-width: 36px;
  }
  #stats-display .stat-row span:last-child {
    color: #aaa; font-size: 11px;
  }
  .setting-group { margin: 14px 0; }
  .setting-group label {
    display: block; margin-bottom: 6px;
    font-size: 12px; color: #999; letter-spacing: 0.06em;
  }
  .setting-group .opts { display: flex; gap: 6px; }
  .setting-group .opts button {
    flex: 1; padding: 10px 4px; font-size: 13px;
    background: rgba(40, 40, 64, 0.6);
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .setting-group .opts button:hover {
    background: rgba(58, 58, 92, 0.7);
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  .setting-group .opts button.active {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    border-color: rgba(255, 120, 100, 0.6);
    box-shadow: 0 4px 14px rgba(231, 76, 60, 0.35);
  }
  #start-btn {
    display: block; width: 100%;
    margin-top: 24px; padding: 14px;
    background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    font-size: 17px; font-weight: 700; letter-spacing: 0.12em;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(231, 76, 60, 0.35);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  #start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(231, 76, 60, 0.5);
  }
  #start-btn:active { transform: translateY(0); }

  /* In-game UI */
  #ui {
    position: absolute; top: 16px; left: 16px;
    background: rgba(12, 12, 24, 0.55);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 16px 20px; border-radius: 14px;
    z-index: 10; min-width: 240px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  #status {
    margin: 0 0 12px 0;
    font-size: 16px; min-height: 22px; font-weight: 700;
    letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 8px;
  }
  .turn-chip {
    display: inline-block; width: 14px; height: 14px; border-radius: 50%;
    box-shadow: 0 0 10px rgba(255,255,255,0.3), inset 0 -2px 4px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  .turn-chip.black { background: radial-gradient(circle at 35% 30%, #555, #0a0a0a 70%); }
  .turn-chip.white { background: radial-gradient(circle at 35% 30%, #fff, #c8c8c8 70%); }
  #ui button {
    background: rgba(60, 60, 90, 0.7);
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  #ui button:hover { background: rgba(80, 80, 120, 0.85); transform: translateY(-1px); }
  #ui button.active {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    border-color: rgba(255,120,100,0.6);
  }
  .row { margin: 6px 0; font-size: 14px; }
  #hint {
    position: absolute; bottom: 10px; left: 12px;
    background: rgba(0,0,0,0.4); padding: 8px 12px; border-radius: 6px;
    font-size: 12px; color: #ccc;
    backdrop-filter: blur(8px);
  }

  /* Result overlay */
  #result-screen {
    position: fixed; inset: 0; z-index: 150;
    display: none; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.4), rgba(0,0,0,0.85));
    animation: fadeIn 0.5s ease;
  }
  #result-screen.show { display: flex; }
  .result-card {
    background: rgba(18, 18, 30, 0.78);
    padding: 50px 64px; border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: resultPop 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes resultPop {
    from { opacity: 0; transform: scale(0.7) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  #result-title {
    font-size: 64px; font-weight: 900;
    letter-spacing: 0.12em; margin-bottom: 8px;
    line-height: 1;
  }
  #result-title.win {
    background: linear-gradient(135deg, #ffe066 0%, #ffa530 50%, #ff5e3a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    filter: drop-shadow(0 0 28px rgba(255, 180, 60, 0.55));
    animation: winPulse 1.4s ease-in-out infinite;
  }
  #result-title.lose {
    color: #ff3a3a;
    text-shadow: 0 0 30px rgba(255, 50, 50, 0.65);
    animation: loseShake 0.5s ease;
  }
  #result-title.draw {
    color: #c0c8d4;
    text-shadow: 0 0 20px rgba(200, 200, 220, 0.4);
  }
  @keyframes winPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.04); }
  }
  @keyframes loseShake {
    0%, 100% { transform: translateX(0); }
    15% { transform: translateX(-14px) rotate(-1deg); }
    30% { transform: translateX(14px) rotate(1deg); }
    45% { transform: translateX(-10px); }
    60% { transform: translateX(10px); }
    75% { transform: translateX(-6px); }
  }
  #result-sub {
    font-size: 16px; color: #b8bcc8;
    margin-bottom: 32px;
    letter-spacing: 0.05em;
  }
  .result-buttons { display: flex; gap: 14px; justify-content: center; }
  .result-buttons button {
    padding: 12px 26px; font-size: 14px;
    background: rgba(60, 60, 100, 0.6);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .result-buttons button:hover {
    transform: translateY(-2px);
    background: rgba(80, 80, 130, 0.75);
    box-shadow: 0 6px 18px rgba(0,0,0,0.3);
  }
  .result-buttons button.primary {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    box-shadow: 0 4px 14px rgba(231, 76, 60, 0.35);
  }
  .result-buttons button.primary:hover {
    box-shadow: 0 8px 24px rgba(231, 76, 60, 0.5);
  }

  /* Confetti canvas */
  #confetti {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 160;
    display: block;
  }

  /* Lose vignette flash (above result modal, transparent in center) */
  #lose-vignette {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 155;
    background: radial-gradient(ellipse at center, transparent 22%, rgba(255, 0, 0, 0.0) 35%, rgba(220, 0, 0, 0.55) 100%);
    opacity: 0; transition: opacity 0.5s ease;
  }
  #lose-vignette.show { opacity: 1; animation: vignettePulse 1.6s ease-in-out infinite; }
  @keyframes vignettePulse {
    0%, 100% { opacity: 0.65; }
    50%      { opacity: 1; }
  }

  /* Seaweed (underwater) UI skin — applied to body when the reef theme is active */
  body.sea-ui #ui {
    background: rgba(9, 38, 32, 0.6);
    border-color: rgba(140, 205, 175, 0.16);
    box-shadow: 0 12px 40px rgba(0, 20, 16, 0.5);
  }
  body.sea-ui #ui button {
    background: rgba(28, 66, 56, 0.72);
    border-color: rgba(150, 210, 180, 0.12);
  }
  body.sea-ui #ui button:hover { background: rgba(44, 94, 80, 0.85); }
  body.sea-ui #ui button.active {
    background: linear-gradient(135deg, #1fa07c, #127063);
    border-color: rgba(130, 235, 195, 0.5);
  }
  body.sea-ui #hint { background: rgba(7, 32, 27, 0.5); color: #c2e6d8; }
  body.sea-ui .result-card { background: rgba(8, 36, 30, 0.82); border-color: rgba(140, 205, 175, 0.16); }
  body.sea-ui .result-buttons button.primary {
    background: linear-gradient(135deg, #1fa07c, #127063);
    box-shadow: 0 4px 14px rgba(20, 150, 110, 0.4);
  }
  body.sea-ui .result-buttons button.primary:hover { box-shadow: 0 8px 24px rgba(20, 160, 120, 0.55); }
  body.sea-ui #result-title.win {
    background: linear-gradient(135deg, #aef0d6 0%, #57c9a4 50%, #2f9e86 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 0 28px rgba(90, 220, 180, 0.5));
  }
  /* Title screen, seaweed skin */
  body.sea-ui #title-screen { background: radial-gradient(ellipse at center, transparent 30%, rgba(3, 22, 18, 0.35) 95%); }
  body.sea-ui .title-card {
    background: url("assets/iso_panel.png") center/100% 100% no-repeat;
    border: none;
    border-radius: 0;
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    filter: drop-shadow(0 18px 30px rgba(0, 14, 10, 0.65));
    padding: 110px 134px 148px 138px;
    max-width: 700px;
  }
  body.sea-ui .title-card h1 {
    background: linear-gradient(135deg, #b9f2da 0%, #62cba6 45%, #2f9e86 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent;
    filter: drop-shadow(0 2px 12px rgba(70, 210, 170, 0.3));
  }
  body.sea-ui .divider { background: linear-gradient(90deg, transparent, rgba(46, 200, 160, 0.55), transparent); }
  body.sea-ui .setting-group label { color: #d8e6dd; text-shadow: 0 1px 2px rgba(0,0,0,0.7); letter-spacing: 0.08em; }
  body.sea-ui #stats-display { color: #c8d8d2; }
  body.sea-ui #stats-display .stats-title { color: #a8c4b8; }
  body.sea-ui .setting-group .opts button.active {
    background: linear-gradient(135deg, #1fa07c, #137064);
    border-color: rgba(130, 235, 195, 0.55);
    box-shadow: 0 4px 14px rgba(20, 150, 110, 0.35);
  }
  body.sea-ui #start-btn {
    background: linear-gradient(135deg, #1fa07c 0%, #117062 100%);
    box-shadow: 0 6px 20px rgba(20, 150, 110, 0.4);
  }
  body.sea-ui #start-btn:hover { box-shadow: 0 10px 28px rgba(20, 160, 120, 0.55); }

  /* --- 磯 (tide-pool) title decorations: real-photo cut-outs, shown only in the seaweed theme --- */
  .iso-decor { display: none; position: absolute; inset: 0; pointer-events: none; z-index: 4; }
  body.sea-ui .iso-decor { display: block; }
  .iso-decor img { display: block; }
  .iso-decor .iso-anemone { filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5)); }
  .iso-decor .iso-barn { filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
  /* sea anemone — gentle whole-body sway (tentacles drift in the current) */
  .iso-anemone { animation: anemSway 5s ease-in-out infinite; transform-origin: 50% 100%; }
  .iso-anemone.s2 { animation-duration: 6.4s; animation-delay: -1.8s; }
  @keyframes anemSway { 0%,100% { transform: rotate(-2.6deg); } 50% { transform: rotate(2.6deg); } }
  /* hermit crab: a photo cut-out that walks the rim; click → withdraw into the shell.
     Explicit width on the wrapper is essential — without it the box collapses to 0 and the
     scaleX(-1) flip pivots around the left edge, sending the crab off the panel on the left.
     User-supplied photo pair (out + tucked, same shell pose) → 360×183 → 110px wide at 56px tall. */
  .hermit { position: absolute; top: auto; bottom: 38px; left: 0; width: 110px; height: 56px; pointer-events: auto; cursor: pointer;
            will-change: left, transform; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
  .hermit .crab-bob { position: relative; width: 100%; height: 100%; }
  .hermit:not(.tucked) .crab-bob { animation: crabBob 0.52s ease-in-out infinite; }
  @keyframes crabBob { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-2px) rotate(2deg); } }
  .hermit img { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); height: 100%; width: auto; transition: opacity 0.45s ease; }
  .hermit .crab-in { opacity: 0; }
  .hermit.tucked .crab-out { opacity: 0; }
  .hermit.tucked .crab-in { opacity: 1; }
</style>
</head>
<body>
<!-- Title screen -->
<div id="title-screen">
  <div class="title-card">
    <h1>立体4目並べ</h1>
    <div class="title-sub">Sogo 3D · 4×4×4</div>
    <div class="divider"></div>
    <div id="stats-display"></div>
    <div class="setting-group">
      <label>モード</label>
      <div class="opts" data-group="mode">
        <button data-val="2p" class="active">2人</button>
        <button data-val="cpu">CPU戦</button>
        <button data-val="arena">アリーナ</button>
      </div>
    </div>
    <div class="setting-group cpu-only" style="display:none">
      <label>CPUの強さ</label>
      <div class="opts" data-group="lv">
        <button data-val="-1">Lv-1</button>
        <button data-val="0">Lv0</button>
        <button data-val="1" class="active">Lv1</button>
        <button data-val="2">Lv2</button>
        <button data-val="3">Lv3</button>
      </div>
    </div>
    <div class="setting-group cpu-only" style="display:none">
      <label>先手</label>
      <div class="opts" data-group="first">
        <button data-val="you" class="active">あなた (黒)</button>
        <button data-val="cpu">CPU (黒)</button>
      </div>
    </div>
    <div class="setting-group arena-only" style="display:none">
      <label>黒のCPU（先手）</label>
      <div class="opts" data-group="arenaBlack">
        <button data-val="-1">Lv-1</button>
        <button data-val="0">Lv0</button>
        <button data-val="1" class="active">Lv1</button>
        <button data-val="2">Lv2</button>
        <button data-val="3">Lv3</button>
      </div>
    </div>
    <div class="setting-group arena-only" style="display:none">
      <label>白のCPU（後手）</label>
      <div class="opts" data-group="arenaWhite">
        <button data-val="-1">Lv-1</button>
        <button data-val="0">Lv0</button>
        <button data-val="1">Lv1</button>
        <button data-val="2" class="active">Lv2</button>
        <button data-val="3">Lv3</button>
      </div>
    </div>
    <div class="setting-group">
      <label>テーマ</label>
      <div class="opts" data-group="theme">
        <button data-val="normal" class="active">通常</button>
        <button data-val="seaweed">人工藻場</button>
      </div>
    </div>
    <div class="setting-group">
      <label>サポート（危険な手を赤くハイライト）</label>
      <div class="opts" data-group="support">
        <button data-val="off" class="active">OFF</button>
        <button data-val="on">ON</button>
      </div>
    </div>
    <button id="start-btn">ゲーム開始</button>
  </div>
</div>

<!-- In-game UI -->
<div id="ui" style="display:none">
  <div id="status">黒の番</div>
  <div class="row">
    <button id="support-toggle">サポート: OFF</button>
    <button id="hint-toggle">ヒント: OFF</button>
  </div>
  <div class="row">
    <button id="undo">↶ 1手</button>
    <button id="reset">リセット</button>
    <button id="to-title">← タイトル</button>
  </div>
</div>
<div id="hint" style="display:none">クリック: 石を置く / ドラッグ: 回転 / スクロール: ズーム</div>

<!-- Lose vignette -->
<div id="lose-vignette"></div>

<!-- Confetti layer -->
<canvas id="confetti"></canvas>

<!-- Result modal -->
<div id="result-screen">
  <div class="result-card">
    <div id="result-title">勝利!</div>
    <div id="result-sub">よくやった</div>
    <div class="result-buttons">
      <button id="result-rematch" class="primary">もう一度</button>
      <button id="result-totitle">タイトルへ</button>
    </div>
  </div>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

const SIZE = 4;
let board, currentPlayer, gameOver;
let mode = '2p';
let cpuColor = 2;
let cpuLevel = 1;
let arenaBlackLevel = 1;
let arenaWhiteLevel = 2;
let supportMode = false;
let hintMode = false;
let theme = 'normal'; // 'normal' | 'seaweed'
let gameGen = 0; // bumps each reset, used to cancel delayed seaweed growth
let titleAnimation = true;
let titleAnimAngle = Math.PI * 0.25;
let lastMoveRing = null;
let cameraAnim = null;
const moveHistory = [];

// === Audio (synthesized via WebAudio) ===
// Master volume control + sfx / ambience / underwater sub-bus.
let audioCtx = null, masterGain = null, sfxGain = null, ambienceGain = null;
let ambienceStarted = false;
let audioPrefs = (() => {
  try { return JSON.parse(localStorage.getItem('sogo3d_audio') || '{}'); }
  catch { return {}; }
})();
const AUDIO_DEFAULT = { master: 0.7, ambience: 0.6, sfx: 0.85, muted: false };
Object.keys(AUDIO_DEFAULT).forEach(k => { if (audioPrefs[k] === undefined) audioPrefs[k] = AUDIO_DEFAULT[k]; });
function saveAudioPrefs() { try { localStorage.setItem('sogo3d_audio', JSON.stringify(audioPrefs)); } catch {} }
function applyAudioGains() {
  if (!audioCtx) return;
  const m = audioPrefs.muted ? 0 : audioPrefs.master;
  masterGain.gain.setTargetAtTime(m, audioCtx.currentTime, 0.05);
  sfxGain.gain.setTargetAtTime(audioPrefs.sfx, audioCtx.currentTime, 0.05);
  ambienceGain.gain.setTargetAtTime(audioPrefs.ambience, audioCtx.currentTime, 0.05);
}
function ensureAudio() {
  if (audioCtx) return;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return; }
  masterGain = audioCtx.createGain(); masterGain.gain.value = audioPrefs.muted ? 0 : audioPrefs.master;
  masterGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain(); sfxGain.gain.value = audioPrefs.sfx; sfxGain.connect(masterGain);
  ambienceGain = audioCtx.createGain(); ambienceGain.gain.value = audioPrefs.ambience; ambienceGain.connect(masterGain);
}
function tone(freq, dur, type = 'triangle', vol = 0.15, attack = 0.005, bus = sfxGain) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();

    }
  }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// --- Animated caustic light pattern projected onto the seabed ---
// Additive plane sitting 5mm above the sand. Wavefront-interference shader produces
// migrating bright "veins" that look like sunlight refracting through the surface.
const causticMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uIntensity: { value: 0.18 }, uColor: { value: new THREE.Color(0xcdf2e6) } },
  vertexShader: `varying vec2 vWorld; void main(){ vec4 wp = modelMatrix*vec4(position,1.0); vWorld = wp.xz; gl_Position = projectionMatrix*viewMatrix*wp; }`,
  fragmentShader: `
    uniform float uTime; uniform float uIntensity; uniform vec3 uColor;
    varying vec2 vWorld;
    float caustic(vec2 p, float t){
      float s = 0.0;
      s += sin(p.x*1.2 + sin(p.y*0.9 + t*0.6)*1.4 + t*0.7);
      s += sin(p.y*1.4 + sin(p.x*1.1 - t*0.4)*1.2 + t*0.55);
      s += sin((p.x+p.y)*0.8 + t*0.5);
      s += sin((p.x-p.y)*1.0 - t*0.45);
      return pow(max(0.0, 1.0 - abs(s)*0.22), 8.0);
    }
    void main(){
      float a = caustic(vWorld*0.55, uTime);
      // Restrict caustics to a small disc around the play area; fall off fast so the
      // distant seabed stays dark/murky.
      vec2 d = vWorld - vec2(1.5, 1.5);
      float fade = smoothstep(7.0, 2.0, length(d));
      gl_FragColor = vec4(uColor, a * uIntensity * fade);
    }`,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, fog: false,
});
const causticPlane = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), causticMat);

// Water surface seen from below: faint shimmering caustic web overhead (fog-exempt so it shows through the murk)
function makeSurfaceTexture() {
  const S = 256;
  const c = document.createElement('canvas'); c.width = c.height = S;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(S, S), d = img.data;
  for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
    const u = x / S * Math.PI * 6, v = y / S * Math.PI * 6;
    // crossing wavefronts → caustic veins where they meet
    let w = Math.sin(u) + Math.sin(v * 1.25 + 0.4) + Math.sin((u + v) * 0.65) + Math.sin((u - v) * 0.85 + 1.1);
    let cv = Math.pow(Math.max(0, 1 - Math.abs(w) * 0.34), 6); // thin bright ripple veins
    const dx = (x - S / 2) / (S / 2), dy = (y - S / 2) / (S / 2);
    const fade = Math.max(0, 1 - Math.hypot(dx, dy));
    const a = Math.min(1, cv) * fade;
    const idx = (y * S + x) * 4;
    d[idx] = 150 + cv * 105; d[idx + 1] = 205 + cv * 50; d[idx + 2] = 190 + cv * 55; d[idx + 3] = a * 255;
  }
  ctx.putImageData(img, 0, 0);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const surfGeo = new THREE.PlaneGeometry(85, 85);

// --- Volumetric god rays from the surface ---
// 14 tall vertical wedges scattered around the play area, additively blended, billboard-rotated
// around Y to face the camera. A noise-based shader gives each ray a soft horizontal gauss profile
// and a slow shimmer along its length. The whole set is fog-exempt so distant rays still glow.
const godRays = new THREE.Group(); godRays.visible = false; scene.add(godRays);
// Rays only descend from y=18 down to y=4 (≈ above the cages), so the seabed stays dim and murky.
const GODRAY_TOP = 18.0, GODRAY_BOT = 4.0;
const godRayMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uIntensity: { value: 0.16 }, uColor: { value: new THREE.Color(0xb6e4d6) } },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    uniform float uTime; uniform float uIntensity; uniform vec3 uColor;
    varying vec2 vUv;
    float hash(float n){ return fract(sin(n)*43758.5453); }
    float noise(vec2 p){
      vec2 i = floor(p), f = fract(p);
      float a = hash(i.x + i.y*57.0), b = hash(i.x+1.0 + i.y*57.0);
      float c = hash(i.x + (i.y+1.0)*57.0), d = hash(i.x+1.0 + (i.y+1.0)*57.0);
      vec2 u = f*f*(3.0-2.0*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }
    void main() {
      // Narrow horizontal gauss profile
      float cx = vUv.x - 0.5;
      float h = exp(-cx*cx*70.0);
      // Fade in at the top, fade out long before reaching the bottom (seabed stays dark)
      float v = smoothstep(0.0, 0.20, 1.0 - vUv.y) * smoothstep(0.0, 0.75, vUv.y);
      // Slow shimmer
      float n = noise(vec2(vUv.x*1.5, vUv.y*4.0 - uTime*0.35));
      n = 0.5 + 0.5*n;
      float a = h * v * n * uIntensity;
      gl_FragColor = vec4(uColor, a);
    }`,
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, fog: false,
});
const godRayGeo = new THREE.PlaneGeometry(1.6, GODRAY_TOP - GODRAY_BOT);
godRayGeo.translate(0, (GODRAY_TOP + GODRAY_BOT) * 0.5, 0);
for (let i = 0; i < 9; i++) {
  const m = new THREE.Mesh(godRayGeo, godRayMat);
  const ang = (i / 9) * Math.PI * 2 + Math.random() * 0.4;
  const r = 2.5 + Math.random() * 6;
  m.position.set(1.5 + Math.cos(ang) * r, 0, 1.5 + Math.sin(ang) * r);
  m.userData = { swayPh: Math.random() * 6.28, scaleX: 0.5 + Math.random() * 0.9 };
  m.scale.x = m.userData.scaleX;
  godRays.add(m);
}
function updateGodRays(time) {
  godRayMat.uniforms.uTime.value = time;
  // Each ray slow-sways laterally + always billboards toward the camera (Y-axis only)
  for (const m of godRays.children) {
    const dx = camera.position.x - m.position.x, dz = camera.position.z - m.position.z;
    m.rotation.y = Math.atan2(dx, dz);
    m.position.x += Math.sin(time * 0.12 + m.userData.swayPh) * 0.0008;
    m.position.z += Math.cos(time * 0.10 + m.userData.swayPh) * 0.0008;
  }
}

function setHover(col) {

let mouseDownPos = null;
renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.button === 0) mouseDownPos = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mouseup', (e) => {
  if (e.button !== 0 || !mouseDownPos) return;
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  mouseDownPos = null;
  if (Math.hypot(dx, dy) > 5) return;
  if (gameOver) return;
  if (mode === 'arena') return;
  if (mode === 'cpu' && currentPlayer === cpuColor) return;
  if (!hoveredColumn) return;
  const { x, z } = hoveredColumn.userData;
  playMove(x, z);
});

function lowestY(x, z) {
  for (let y = 0; y < 4; y++) if (board[x][y][z] === 0) return y;
  return -1;
}

function playMove(x, z) {
  if (resetAnimState) return;
  const y = lowestY(x, z);
  if (y < 0) return;
  board[x][y][z] = currentPlayer;
  // Compute winLine BEFORE spawning the visual stone so we can defer the highlight to the land tick.
  const winLine = checkWin(currentPlayer);
  addStone(x, y, z, currentPlayer, winLine ? () => highlightWin(winLine) : null);
  moveHistory.push({ x, y, z, player: currentPlayer });
  highlightLastMove(stones[stones.length - 1]);
  if (winLine) {
    gameOver = true;
    const winnerColor = currentPlayer;
    document.getElementById('status').textContent = (winnerColor === 1 ? '黒' : '白') + 'の勝ち!';
    setTimeout(() => showResult(winnerColor), 1400);
    return;
  }
  if (isFull()) {
    gameOver = true;
    document.getElementById('status').textContent = '引き分け';
    setTimeout(() => showResult('draw'), 600);
    return;
  }
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  updateStatus();
  updateWarnings();
  updateHint();
  if (gameOver) return;
  if (mode === 'cpu' && currentPlayer === cpuColor) setTimeout(cpuMove, 350);
  else if (mode === 'arena') setTimeout(cpuMove, 550);
}

function updateHint() {
  if (!hintMode || gameOver || resetAnimState || mode === 'arena' ||
      (mode === 'cpu' && currentPlayer === cpuColor)) {
    hintMesh.material.opacity = 0;
    return;
  }
  const me = currentPlayer;
  const win = findOneMoveWin(me);
  let best;
  if (win) {
    best = win;
  } else {
    const moves = collectMoves();
    if (moves.length === 0) { hintMesh.material.opacity = 0; return; }
    let bestScore = -Infinity, bestMove = moves[0];
    for (const m of moves) {
      board[m.x][m.y][m.z] = me;
      let score;
      if (checkWin(me)) score = 100000;
      else score = minimax(2, -Infinity, Infinity, false, me);
      board[m.x][m.y][m.z] = 0;
      if (score > bestScore) { bestScore = score; bestMove = m; }
    }
    best = { x: bestMove.x, z: bestMove.z };
  }
  hintMesh.position.x = best.x;
  hintMesh.position.z = best.z;
  hintMesh.material.opacity = 0.22;
}

function undo() {
  if (resetAnimState || moveHistory.length === 0 || mode === 'arena') return;
  // In CPU mode, undo CPU's move and yours
  const count = (mode === 'cpu' && moveHistory.length >= 2) ? 2 : 1;
  for (let i = 0; i < count && moveHistory.length > 0; i++) {
    const m = moveHistory.pop();
    board[m.x][m.y][m.z] = 0;
    const idx = stones.findIndex(s =>
      s.userData.x === m.x && s.userData.y === m.y && s.userData.z === m.z);
    if (idx >= 0) {
      const undoStone = stones[idx];
      stoneGroup.remove(undoStone);
      disposeStone(undoStone);
      stones.splice(idx, 1);
    }
    currentPlayer = m.player;
  }
  gameOver = false;
  if (winLineMesh) {
    scene.remove(winLineMesh);
    if (winLineMesh.geometry) winLineMesh.geometry.dispose();
    disposeMaterial(winLineMesh.material);
    winLineMesh = null;
  }
  document.getElementById('result-screen').classList.remove('show');
  stopConfetti();
  document.getElementById('lose-vignette').classList.remove('show');
  // Restore last-move ring to previous move
  if (lastMoveRing) { scene.remove(lastMoveRing); lastMoveRing = null; }
  if (moveHistory.length > 0) {
    const last = moveHistory[moveHistory.length - 1];
    const lastStone = stones.find(s =>
      s.userData.x === last.x && s.userData.y === last.y && s.userData.z === last.z);
    if (lastStone) highlightLastMove(lastStone);
  }
  sfxUndo();
  updateStatus();
  updateWarnings();
  updateHint();
}

// Create the visual mesh for one stone at the current theme (no positioning, no group add).
function makeStoneMesh(player) {
  if (theme === 'seaweed') return createCage(player);
  const stone = new THREE.Mesh(
    new THREE.SphereGeometry(0.38, 36, 36),
    new THREE.MeshPhysicalMaterial({
      color: player === 1 ? 0x0e0e0e : 0xdcdad4,
      metalness: 0.0,
      roughness: player === 1 ? 0.22 : 0.35,
      clearcoat: 0.85,
      clearcoatRoughness: 0.1,
      reflectivity: 0.45,
    })
  );
  stone.castShadow = true;
  stone.receiveShadow = true;
  return stone;
}
function addStone(x, y, z, player, onLand) {
  const isSea = (theme === 'seaweed');
  const stone = makeStoneMesh(player);
  stone.position.set(x, 4.5, z);
  // Preserve any per-mesh data that makeStoneMesh set (e.g. createCage's rubbleMat).
  Object.assign(stone.userData, { x, y, z, player });
  stoneGroup.add(stone);
  stones.push(stone);
  // Drop + bounce + squash animation (cages sink slower, less bounce)
  const startTime = performance.now();
  const fallDur = isSea ? 420 : 240;
  const bounceDur = isSea ? 200 : 360;
  const startY = 4.5;
  let landed = false;
  const gen = gameGen;
  function tick() {
    const elapsed = performance.now() - startTime;
    if (elapsed < fallDur) {
      const t = elapsed / fallDur;
      // Sea: ease-out (water drag); normal: ease-in (free fall)
      const prog = isSea ? (1 - (1 - t) * (1 - t)) : (t * t);
      stone.position.y = startY + (y - startY) * prog;
      requestAnimationFrame(tick);
    } else if (elapsed < fallDur + bounceDur) {
      if (!landed) {
        landed = true;
        sfxStone(player);
        if (isSea) {
          spawnBubbles(x, y, z);
          // Stamp landing time so the rubble starts aging from now (algae encrustation timer)
          stone.userData.placedAt = performance.now() * 0.001;
          // Seaweed grows some time after the cage settles
          setTimeout(() => { if (gen === gameGen && theme === 'seaweed') spawnSeaweed(x, y, z); }, 1800 + Math.random() * 2500);
        }
        if (onLand) onLand();                                              // e.g. show win line only after the stone has landed
      }
      const t = (elapsed - fallDur) / bounceDur;
      const damp = Math.exp(-t * 3.5);
      const amp = (startY - y) * (isSea ? 0.03 : 0.12);
      stone.position.y = y + damp * amp * Math.abs(Math.sin(t * Math.PI * 2.5));
      if (!isSea) {
        const sqProgress = Math.min((elapsed - fallDur) / 70, 1);
        const sq = (1 - sqProgress) * 0.16;
        stone.scale.set(1 + sq, 1 - sq * 1.2, 1 + sq);
      }
      requestAnimationFrame(tick);
    } else {
      stone.position.y = y;
      stone.scale.set(1, 1, 1);
    }
  }
  tick();
}

function highlightLastMove(stoneMesh) {
  if (lastMoveRing) {
    scene.remove(lastMoveRing);
    lastMoveRing.geometry.dispose();
    disposeMaterial(lastMoveRing.material);                               // was leaking the BasicMaterial every move
  }
  if (!stoneMesh) { lastMoveRing = null; return; }
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.46, 0.035, 12, 36),
    new THREE.MeshBasicMaterial({ color: 0xffc850, transparent: true, opacity: 0.85, depthWrite: false })
  );
  ring.position.copy(stoneMesh.position);
  ring.rotation.x = Math.PI / 2;
  scene.add(ring);
  lastMoveRing = ring;
}

function checkWin(player) {
  for (const line of allLines) {
    let win = true;
    for (const [x,y,z] of line) {
      if (board[x][y][z] !== player) { win = false; break; }
    }
    if (win) return line;
  }
  return null;
}

function isFull() {
  for (let x = 0; x < 4; x++) for (let z = 0; z < 4; z++) {
    if (lowestY(x, z) >= 0) return false;
  }
  return true;
}

function highlightWin(line) {
  const key = (x,y,z) => `${x},${y},${z}`;
  const set = new Set(line.map(([x,y,z]) => key(x,y,z)));
  for (const s of stones) {
    if (set.has(key(s.userData.x, s.userData.y, s.userData.z))) {
      if (s.isMesh && s.material) {
        s.material.emissive = new THREE.Color(0xff3322);
        s.material.emissiveIntensity = 0.85;
      } else {
        // Cage (group): clone child materials and make them glow
        s.traverse(o => {
          if (o.isMesh && o.material) {
            o.material = o.material.clone();
            o.material.emissive = new THREE.Color(0xff5522);
            o.material.emissiveIntensity = 0.7;
          }
        });
      }
    }
  }
  const pts = line.map(([x,y,z]) => new THREE.Vector3(x, y, z));
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color: 0xff7733 });
  winLineMesh = new THREE.Line(geo, mat);
  scene.add(winLineMesh);
  // Focus camera on the winning line center
  const center = new THREE.Vector3();
  for (const [x, y, z] of line) center.add(new THREE.Vector3(x, y, z));
  center.divideScalar(line.length);
  const offset = new THREE.Vector3(4.5, 3, 5);
  animateCamera(center.clone().add(offset), center, 1300);
}

function animateCamera(toPos, toLook, duration = 1200) {
  cameraAnim = {
    startTime: performance.now(),
    duration,
    fromPos: camera.position.clone(),
    fromLook: controls.target.clone(),
    toPos: toPos.clone(),
    toLook: toLook.clone(),
  };
}
function tickCameraAnim() {
  const c = cameraAnim;
  const tNorm = Math.min((performance.now() - c.startTime) / c.duration, 1);
  // ease in-out cubic
  const e = tNorm < 0.5 ? 4 * tNorm * tNorm * tNorm : 1 - Math.pow(-2 * tNorm + 2, 3) / 2;
  camera.position.lerpVectors(c.fromPos, c.toPos, e);
  controls.target.lerpVectors(c.fromLook, c.toLook, e);
  controls.update();
  if (tNorm >= 1) cameraAnim = null;

function updateWarnings() {

// Reset animation: board lifts + tilts past upright; stones slide along their posts and exit the open top
let resetAnimState = null;
const POST_LENGTH = 4; // local-y span: -0.5 to 3.5
const STONE_GRAVITY = 0.025;
const _tmpWorldUp = new THREE.Vector3();
const _tmpLocal = new THREE.Vector3();
function triggerResetAnim(onDone) {
  resetAnimState = {
    startTime: performance.now(),
    duration: 1700,
    liftAmp: 0.55,
    tiltZ: 2.0 + (Math.random() - 0.5) * 0.3,
    tiltX: 0.35 + (Math.random() - 0.5) * 0.2,
    stones: stones.map(s => {
      const initT = s.userData.y + 0.5; // local-y of stone center = -0.5 + initT
      return {
        mesh: s,
        px: s.userData.x - 1.5,
        pz: s.userData.z - 1.5,
        t: initT,
        minT: initT, // can't slip below its original position (would clip into stones beneath / base)
        vt: 0,
        free: false,
        vx: 0, vy: 0, vz: 0,
        rx: 0, rz: 0,
      };
    }),
    onDone,
  };
  for (const m of warningMeshes) m.material.opacity = 0;
  if (hoveredColumn) { hoveredColumn.material.opacity = 0; hoveredColumn = null; }
}
function tickResetAnim() {
  const s = resetAnimState;
  const elapsed = performance.now() - s.startTime;
  const tNorm = elapsed / s.duration;
  if (tNorm >= 1) {
    const done = s.onDone;
    resetAnimState = null;
    boardGroup.position.set(1.5, 0, 1.5);
    boardGroup.rotation.set(0, 0, 0);
    done();
    return;
  }
  // Board: sinusoidal lift + tilt, returning to rest
  const curve = Math.sin(tNorm * Math.PI);
  boardGroup.position.y = s.liftAmp * curve;
  boardGroup.rotation.z = s.tiltZ * curve;
  boardGroup.rotation.x = s.tiltX * curve;
  boardGroup.updateMatrixWorld(true);

  // Post direction in world space (= local +Y of boardGroup, after rotation)
  _tmpWorldUp.set(0, 1, 0).applyQuaternion(boardGroup.quaternion);

  // Axial gravity along the post: -G·worldUp (component of gravity along post axis)
  // When post is upright (worldUp.y≈1) → negative (toward base). Past horizontal (worldUp.y<0) → positive (toward open top).
  const axialAccel = -STONE_GRAVITY * _tmpWorldUp.y;

  for (const fs of s.stones) {
    if (fs.free) {
      fs.vy -= STONE_GRAVITY;
      fs.mesh.position.x += fs.vx;
      fs.mesh.position.y += fs.vy;
      fs.mesh.position.z += fs.vz;
      fs.mesh.rotation.x += fs.rx;
      fs.mesh.rotation.z += fs.rz;
      continue;
    }
    fs.vt += axialAccel;
    fs.t += fs.vt;
    if (fs.t > POST_LENGTH) {
      // Slipped off the open end → detach
      fs.free = true;
      _tmpLocal.set(fs.px, -0.5 + POST_LENGTH, fs.pz);
      boardGroup.localToWorld(_tmpLocal);
      fs.mesh.position.copy(_tmpLocal);
      // Convert axial velocity → world-space velocity along current post direction
      fs.vx = fs.vt * _tmpWorldUp.x;
      fs.vy = fs.vt * _tmpWorldUp.y;
      fs.vz = fs.vt * _tmpWorldUp.z;
      fs.rx = (Math.random() - 0.5) * 0.15;
      fs.rz = (Math.random() - 0.5) * 0.15;
    } else {
      if (fs.t < fs.minT) { fs.t = fs.minT; fs.vt = 0; }
      _tmpLocal.set(fs.px, -0.5 + fs.t, fs.pz);
      boardGroup.localToWorld(_tmpLocal);
      fs.mesh.position.copy(_tmpLocal);
    }
  }
}

let seaweedResetting = false;
function reset() {
  if (resetAnimState || seaweedResetting) return;
  document.getElementById('result-screen').classList.remove('show');
  stopConfetti();
  document.getElementById('lose-vignette').classList.remove('show');
  if (stones.length === 0) {
    restartGame();
  } else if (theme === 'seaweed') {
    // No board flip underwater — cages bubble away, board stays put
    seaweedResetting = true;
    for (const s of stones) spawnBubbles(s.position.x, s.position.y, s.position.z, 10);
    if (lastMoveRing) {
      scene.remove(lastMoveRing);
      if (lastMoveRing.geometry) lastMoveRing.geometry.dispose();
      disposeMaterial(lastMoveRing.material);
      lastMoveRing = null;
    }
    setTimeout(() => { seaweedResetting = false; restartGame(); }, 650);
  } else {
    // Normal mode: kill the red win-line (and yellow last-move ring) BEFORE the board flip starts,
    // otherwise they linger floating in space while stones fly out.
    if (winLineMesh) {
      scene.remove(winLineMesh);
      if (winLineMesh.geometry) winLineMesh.geometry.dispose();
      disposeMaterial(winLineMesh.material);
      winLineMesh = null;
    }
    if (lastMoveRing) {
      scene.remove(lastMoveRing);
      if (lastMoveRing.geometry) lastMoveRing.geometry.dispose();
      disposeMaterial(lastMoveRing.material);
      lastMoveRing = null;
    }
    triggerResetAnim(restartGame);
  }
}
function restartGame() {
  initState();
  gameGen++;
  // Dispose per-stone GPU resources before dropping the references.
  for (const s of stones) disposeStone(s);
  stoneGroup.clear();
  stones = [];
  moveHistory.length = 0;
  clearReefEffects();
  if (winLineMesh) {
    scene.remove(winLineMesh);
    if (winLineMesh.geometry) winLineMesh.geometry.dispose();
    disposeMaterial(winLineMesh.material);
    winLineMesh = null;
  }
  if (lastMoveRing) {
    scene.remove(lastMoveRing);
    if (lastMoveRing.geometry) lastMoveRing.geometry.dispose();
    disposeMaterial(lastMoveRing.material);
    lastMoveRing = null;
  }
  hintMesh.material.opacity = 0;
  barnacleGrowth = 0; barnacleMat.opacity = 0; // fresh concrete each game
  // Return camera to default if it was zoomed in
  cameraAnim = null;
  if (mode !== 'arena' && !titleAnimation) {
    if (theme === 'seaweed') camera.position.set(5, 4.6, 6.3);
    else camera.position.set(7, 7, 9);
    controls.target.set(1.5, 1.5, 1.5);
    controls.update();
  }
  updateStatus();
  updateWarnings();
  updateHint();
  if (mode === 'cpu' && currentPlayer === cpuColor) setTimeout(cpuMove, 350);
  else if (mode === 'arena') setTimeout(cpuMove, 550);
}

let confettiActive = false;
function showConfetti() {
  const canvas = document.getElementById('confetti');
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd', '#ff9ff3', '#ffd700', '#ff8c00'];
  const N = 80;
  const particles = [];
  for (let i = 0; i < N; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 240,
      vx: (Math.random() - 0.5) * 1.6,
      vy: 1.8 + Math.random() * 2.5,
      ay: 0.04 + Math.random() * 0.03,
      r: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.16,
      w: 7 + Math.random() * 4,
      h: 10 + Math.random() * 6,
      color: colors[i % colors.length],
      circle: Math.random() < 0.35,
    });
  }
  confettiActive = true;
  function tick() {
    if (!confettiActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = 0;
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += p.ay;
      p.r += p.vr;
      if (p.y < canvas.height + 30) {
        alive++;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.r);
        ctx.fillStyle = p.color;
        if (p.circle) { ctx.beginPath(); ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2); ctx.fill(); }
        else ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
    }
    if (alive > 0) requestAnimationFrame(tick);
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); confettiActive = false; }
  }
  tick();
}
function stopConfetti() {
  confettiActive = false;
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// CPU AI dispatch (uses `currentPlayer` as "me"; level depends on mode)
//   Lv-1: win + random (no block)
//   Lv0 : win + block + random
//   Lv1 : win + block + heuristic
//   Lv2 : win + block + minimax (depth 4)
function cpuMove() {
  if (gameOver || resetAnimState) return;
  let lv;
  if (mode === 'cpu') lv = cpuLevel;
  else if (mode === 'arena') lv = currentPlayer === 1 ? arenaBlackLevel : arenaWhiteLevel;
  else return;
  const me = currentPlayer;
  const opp = me === 1 ? 2 : 1;
  const win = findOneMoveWin(me);
  if (win) return playMove(win.x, win.z);
  if (lv === -1) { cpuMoveRandom(); return; }
  const block = findOneMoveWin(opp);
  if (block) return playMove(block.x, block.z);
  if (lv === 0) { cpuMoveRandom(); return; }
  if (lv === 3) cpuMovePerfect(me);
  else if (lv === 2) cpuMoveStrong(me);
  else cpuMoveHeuristic(me);
}

function cpuMoveRandom() {
  const moves = collectMoves();
  if (moves.length === 0) return;
  const m = moves[Math.floor(Math.random() * moves.length)];
  playMove(m.x, m.z);
}

function cpuMoveHeuristic(me) {
  const opp = me === 1 ? 2 : 1;
  let bestScore = -Infinity, bestMove = null;
  for (let x = 0; x < 4; x++) for (let z = 0; z < 4; z++) {
    const y = lowestY(x, z);
    if (y < 0) continue;
    let score = scoreMove(x, y, z, me) + Math.random() * 0.5;
    if (y + 1 < 4) {
      board[x][y][z] = me;
      board[x][y+1][z] = opp;
      if (checkWin(opp)) score -= 500;
      board[x][y+1][z] = 0;
      board[x][y][z] = 0;
    }
    if (score > bestScore) { bestScore = score; bestMove = { x, z }; }
  }
  if (bestMove) playMove(bestMove.x, bestMove.z);
}

function collectMoves() {
  const moves = [];
  for (let x = 0; x < 4; x++) for (let z = 0; z < 4; z++) {
    const y = lowestY(x, z);
    if (y >= 0) moves.push({ x, y, z });
  }
  // Center-first ordering for better alpha-beta pruning
  moves.sort((a, b) =>
    (Math.abs(a.x - 1.5) + Math.abs(a.z - 1.5)) -
    (Math.abs(b.x - 1.5) + Math.abs(b.z - 1.5))
  );
  return moves;
}

function evaluateBoard(me) {
  const opp = me === 1 ? 2 : 1;
  let score = 0;
  for (const line of allLines) {
    let mine = 0, opps = 0;
    for (const [x, y, z] of line) {
      if (board[x][y][z] === me) mine++;
      else if (board[x][y][z] === opp) opps++;
    }
    if (opps === 0 && mine > 0) score += [0, 1, 10, 100][mine];
    else if (mine === 0 && opps > 0) score -= [0, 1, 10, 100][opps];
  }
  return score;
}

function minimax(depth, alpha, beta, isMaxTurn, me) {
  if (depth === 0) return evaluateBoard(me);
  const moves = collectMoves();
  if (moves.length === 0) return 0;
  const opp = me === 1 ? 2 : 1;
  if (isMaxTurn) {
    let best = -Infinity;
    for (const m of moves) {
      board[m.x][m.y][m.z] = me;
      let score;
      if (checkWin(me)) score = 100000 + depth;
      else score = minimax(depth - 1, alpha, beta, false, me);
      board[m.x][m.y][m.z] = 0;
      if (score > best) best = score;
      if (best > alpha) alpha = best;
      if (beta <= alpha) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const m of moves) {
      board[m.x][m.y][m.z] = opp;
      let score;
      if (checkWin(opp)) score = -100000 - depth;
      else score = minimax(depth - 1, alpha, beta, true, me);
      board[m.x][m.y][m.z] = 0;
      if (score < best) best = score;
      if (best < beta) beta = best;
      if (beta <= alpha) break;
    }
    return best;
  }
}

function cpuMoveStrong(me) {
  const DEPTH = 4;
  const moves = collectMoves();
  let bestScore = -Infinity, bestMove = moves[0];
  for (const m of moves) {
    board[m.x][m.y][m.z] = me;
    let score;
    if (checkWin(me)) score = 100000 + DEPTH;
    else score = minimax(DEPTH - 1, -Infinity, Infinity, false, me);
    board[m.x][m.y][m.z] = 0;
    if (score > bestScore) { bestScore = score; bestMove = m; }
  }
  playMove(bestMove.x, bestMove.z);
}

// ===== Lv3: Iterative deepening + Zobrist TT =====
const zobrist = [
  new Uint32Array(64),
  new Uint32Array(64),
];
for (let p = 0; p < 2; p++)
  for (let i = 0; i < 64; i++)
    zobrist[p][i] = (Math.random() * 0xffffffff) >>> 0;
const ZOBRIST_TURN = (Math.random() * 0xffffffff) >>> 0;
function posKey(x, y, z) { return x * 16 + y * 4 + z; }
function boardHash(isMaxTurn) {
  let h = isMaxTurn ? ZOBRIST_TURN : 0;
  for (let x = 0; x < 4; x++)
    for (let y = 0; y < 4; y++)
      for (let z = 0; z < 4; z++) {
        const v = board[x][y][z];
        if (v !== 0) h ^= zobrist[v - 1][posKey(x, y, z)];
      }
  return h >>> 0;
}

const TT = new Map();
let _timeUp = false, _searchStart = 0, _timeLimit = 2500, _nodes = 0;
function _checkTime() {
  _nodes++;
  if ((_nodes & 0x3FF) !== 0) return _timeUp;
  if (!_timeUp && performance.now() - _searchStart > _timeLimit) _timeUp = true;
  return _timeUp;
}

function minimaxTT(depth, alpha, beta, isMaxTurn, me) {
  if (_checkTime()) return 0;
  const alphaOrig = alpha, betaOrig = beta;
  const h = boardHash(isMaxTurn);
  const tt = TT.get(h);
  let ttBest = null;
  if (tt && tt.depth >= depth) {
    if (tt.flag === 0) return tt.score;
    if (tt.flag === 1) alpha = Math.max(alpha, tt.score);
    else if (tt.flag === 2) beta = Math.min(beta, tt.score);
    if (alpha >= beta) return tt.score;
  }
  if (tt) ttBest = tt.bestMove;

  if (depth === 0) return evaluateBoard(me);
  let moves = collectMoves();
  if (moves.length === 0) return 0;
  if (ttBest) {
    const idx = moves.findIndex(m => m.x === ttBest.x && m.z === ttBest.z);
    if (idx > 0) { const [bm] = moves.splice(idx, 1); moves.unshift(bm); }
  }

  const opp = me === 1 ? 2 : 1;
  let best = isMaxTurn ? -Infinity : Infinity;
  let bestMove = null;

  for (const m of moves) {
    const player = isMaxTurn ? me : opp;
    board[m.x][m.y][m.z] = player;
    let score;
    if (checkWin(player)) {
      score = isMaxTurn ? 100000 + depth : -100000 - depth;
    } else {
      score = minimaxTT(depth - 1, alpha, beta, !isMaxTurn, me);
    }
    board[m.x][m.y][m.z] = 0;
    if (_timeUp) return 0;
    if (isMaxTurn) {
      if (score > best) { best = score; bestMove = m; }
      if (best > alpha) alpha = best;
    } else {
      if (score < best) { best = score; bestMove = m; }
      if (best < beta) beta = best;
    }
    if (beta <= alpha) break;
  }
  if (!_timeUp) {
    let flag;
    if (best <= alphaOrig) flag = 2;
    else if (best >= betaOrig) flag = 1;
    else flag = 0;
    TT.set(h, { score: best, depth, flag, bestMove });
  }
  return best;
}

function cpuMovePerfect(me) {
  TT.clear();
  _timeUp = false;
  _nodes = 0;
  _searchStart = performance.now();
  _timeLimit = 2500;
  let bestMove = null;
  let bestScore = -Infinity;
  let lastIterTime = 0;

  for (let depth = 2; depth <= 14; depth++) {
    const elapsed = performance.now() - _searchStart;
    if (elapsed > _timeLimit) break;
    // Don't start an iteration we can't finish (next iter ≈ 8x previous in Sogo)
    if (lastIterTime > 0 && elapsed + lastIterTime * 8 > _timeLimit) break;

    const iterStart = performance.now();
    let moves = collectMoves();
    if (bestMove) {
      const idx = moves.findIndex(m => m.x === bestMove.x && m.z === bestMove.z);
      if (idx > 0) { const [bm] = moves.splice(idx, 1); moves.unshift(bm); }
    }
    let curBest = -Infinity, curBestMove = null, aborted = false;
    for (const m of moves) {
      board[m.x][m.y][m.z] = me;
      let score;
      if (checkWin(me)) score = 100000 + depth;
      else score = minimaxTT(depth - 1, -Infinity, Infinity, false, me);
      board[m.x][m.y][m.z] = 0;
      if (_timeUp) { aborted = true; break; }
      if (score > curBest) { curBest = score; curBestMove = m; }
    }
    if (!aborted && curBestMove) {
      bestScore = curBest;
      bestMove = curBestMove;
    }
    lastIterTime = performance.now() - iterStart;
    if (Math.abs(bestScore) >= 90000) break;
  }
  if (!bestMove) {
    const moves = collectMoves();
    if (moves.length > 0) bestMove = moves[0];
  }
  if (bestMove) playMove(bestMove.x, bestMove.z);
}

function findOneMoveWin(player) {
  for (let x = 0; x < 4; x++) for (let z = 0; z < 4; z++) {
    const y = lowestY(x, z);
    if (y < 0) continue;
    board[x][y][z] = player;
    const w = checkWin(player);
    board[x][y][z] = 0;
    if (w) return { x, z };
  }
  return null;
}

function scoreMove(x, y, z, player) {
  const opp = player === 1 ? 2 : 1;
  let score = 0;
  for (const line of allLines) {
    if (!line.some(([lx,ly,lz]) => lx===x && ly===y && lz===z)) continue;
    let mine = 0, opps = 0;
    for (const [lx,ly,lz] of line) {
      if (lx===x && ly===y && lz===z) continue;
      if (board[lx][ly][lz] === player) mine++;
      else if (board[lx][ly][lz] === opp) opps++;
    }
    if (opps === 0) score += [1, 5, 30, 200][mine];
    else if (mine === 0) score += [0, 2, 15, 150][opps];
  }
  score += (3 - Math.abs(x - 1.5) - Math.abs(z - 1.5)) * 0.5;
  score += (3 - y) * 0.3;
  return score;
}

let causticBase = 0.7;
// Recreate every existing stone with the current-theme's mesh. Called by applyTheme so that
// switching theme during/after play updates the visible appearance of already-placed stones.
function reskinStones() {
  if (stones.length === 0) return;
  const old = stones.slice();
  // Dispose before clearing so cloned rubble mats / per-stone geometries don't leak across themes.
  for (const s of old) disposeStone(s);
  stoneGroup.clear();
  stones = [];
  const now = performance.now() * 0.001;
  for (const s of old) {
    const { x, y, z, player } = s.userData;
    const m = makeStoneMesh(player);
    m.position.set(x, y, z);
    Object.assign(m.userData, { x, y, z, player });
    // If we're producing cages, restart aging from now so the new rubble has a defined timer.
    if (m.userData.rubbleMat) m.userData.placedAt = now;
    stoneGroup.add(m);
    stones.push(m);
  }
  // Restore the yellow last-move ring on the new mesh
  if (moveHistory.length > 0) {
    const last = moveHistory[moveHistory.length - 1];
    const lastStone = stones.find(s => s.userData.x === last.x && s.userData.y === last.y && s.userData.z === last.z);
    if (lastStone) highlightLastMove(lastStone);
  }
}

// --- Cage: thick edge frame + wire-mesh grid on all 6 faces (gabion look) ---
const CAGE_SIZE = 0.74, BAR_R = 0.024;
function buildCageFrameGeo() {
  const h = CAGE_SIZE / 2;
  const up = new THREE.Vector3(0, 1, 0);
  const parts = [];
  function bar(a, b, r, seg) {
    const va = new THREE.Vector3(...a), vb = new THREE.Vector3(...b);
    const dir = new THREE.Vector3().subVectors(vb, va);
    const g = new THREE.CylinderGeometry(r, r, dir.length(), seg);
    const q = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
    g.applyMatrix4(new THREE.Matrix4().compose(va.addScaledVector(dir, 0.5), q, new THREE.Vector3(1, 1, 1)));
    parts.push(g);
  }
  const v = [[-h,-h,-h],[h,-h,-h],[-h,-h,h],[h,-h,h],[-h,h,-h],[h,h,-h],[-h,h,h],[h,h,h]];
  const edges = [[0,1],[2,3],[4,5],[6,7],[0,2],[1,3],[4,6],[5,7],[0,4],[1,5],[2,6],[3,7]];
  for (const [ia, ib] of edges) bar(v[ia], v[ib], BAR_R, 6); // thick edges
  // Wire-mesh grid on each face
  const div = 4;
  const wr = BAR_R * 0.42;
  for (let i = 1; i < div; i++) {
    const t = -h + CAGE_SIZE * i / div;
    for (const fy of [-h, h]) { bar([-h,fy,t],[h,fy,t], wr, 4); bar([t,fy,-h],[t,fy,h], wr, 4); } // top/bottom
    for (const fz of [-h, h]) { bar([-h,t,fz],[h,t,fz], wr, 4); bar([t,-h,fz],[t,h,fz], wr, 4); } // front/back
    for (const fx of [-h, h]) { bar([fx,-h,t],[fx,h,t], wr, 4); bar([fx,t,-h],[fx,t,h], wr, 4); } // left/right
  }
  for (const p of v) { const s = new THREE.SphereGeometry(BAR_R * 1.5, 6, 6); s.translate(...p); parts.push(s); }

}

// --- Kelp: a chain of segments that bend progressively (wave travels up) ---
// === カジメ (Ecklonia cava): single stiff stipe + crown of ribbon blades arcing up & out ===
// Scale: 1 world unit ≈ 1 m (UUV ≈ 1 m). Real kajime ≈ 1–2.5 m tall.

// Procedural blade texture: olive-brown, longitudinal striations + darker midrib + mottle, ruffled-edge alpha
function makeKajimeTexture() {
  const W = 48, H = 192;
  const c = document.createElement('canvas'); c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(W, H), d = img.data;
  for (let v = 0; v < H; v++) {
    const tv = 1 - v / (H - 1);                       // 0 base, 1 tip
    const ruffle = 0.05 * Math.sin(tv * 38) + 0.035 * Math.sin(tv * 15 + 1);
    const halfFrac = 0.4 + ruffle;                    // opaque half-width fraction (wavy margin)
    for (let u = 0; u < W; u++) {
      const cu = u / (W - 1) - 0.5, dist = Math.abs(cu);
      const stri = 0.8 + 0.2 * Math.abs(Math.sin(u * 0.85));     // longitudinal striations
      const midrib = dist < 0.05 ? 0.62 : 1;                      // darker central rib
      const grad = 0.74 + 0.36 * tv;                              // tip a touch lighter / bleached
      const mottle = 0.88 + 0.12 * Math.sin(u * 0.6 + v * 0.18) * Math.cos(v * 0.06);
      const f = stri * midrib * grad * mottle;
      const idx = (v * W + u) * 4;
      d[idx] = 86 * f; d[idx + 1] = 73 * f; d[idx + 2] = 33 * f;  // olive-brown
      d[idx + 3] = dist < halfFrac ? 255 : Math.max(0, 255 * (1 - (dist - halfFrac) / 0.04));
    }
  }
  ctx.putImageData(img, 0, 0);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const kajimeTex = makeKajimeTexture();
// Blade geometry: ribbon bent along a circular arc (base splays out, tip sweeps up) + gentle lateral S-curve
function makeKajimeBladeGeo(len, w, bend, sway) {
  const g = new THREE.PlaneGeometry(w, len, 2, 10);
  const pos = g.attributes.position;
  const R = len / bend;
  for (let i = 0; i < pos.count; i++) {
    const x0 = pos.getX(i), y0 = pos.getY(i);
    const t = (y0 + len / 2) / len;
    const a = t * bend;
    const ny = R * (1 - Math.cos(a));
    const nz = R * Math.sin(a);
    const taper = 1 - 0.4 * t;
    const lateral = Math.sin(t * Math.PI * 1.3) * sway;   // sinuous side curve
    pos.setXYZ(i, x0 * taper + lateral, ny, nz);
  }
  g.computeVertexNormals();
  return g;
}
const holdfastGeo = new THREE.IcosahedronGeometry(0.08, 0);
const stipeMat = new THREE.MeshStandardMaterial({ color: 0x5a4824, roughness: 0.78, metalness: 0 });

  new THREE.MeshStandardMaterial({ map: kajimeTex, color: 0xc6d2b2, roughness: 0.6, metalness: 0.05, side: THREE.DoubleSide, alphaTest: 0.45 }),
  new THREE.MeshStandardMaterial({ map: kajimeTex, color: 0xe6d4a8, roughness: 0.62, metalness: 0.05, side: THREE.DoubleSide, alphaTest: 0.45 }),

function makeFishBodyGeo(aspect) {

  const halfH = bodyAspect / 2;
  const prof = [
    [0.020, 0.00],   // tail tip
    [0.10,  0.04],
    [0.26,  0.10],
    [0.50,  0.18],
    [0.74,  0.28],
    [0.90,  0.38],
    [1.00,  0.50],   // widest at mid-body
    [0.98,  0.62],
    [0.85,  0.74],
    [0.62,  0.84],
    [0.30,  0.93],
    [0.04,  1.00],   // head tip

  g.rotateZ(Math.PI / 2);                                                 // length along +X (head at +X)

// --- Boids: separation + alignment + cohesion (same species), gentle reef attraction, cage avoidance ---
const _fishTmp = new THREE.Vector3();
function updateFish(time) {
  // Boids parameters (tuned to the reef scale: cage at radius ≤ 2, fish patrol radius ≈ 4)
  const PERCEPTION = 1.6, SEP_RADIUS = 0.55;
  const W_SEP = 0.030, W_ALI = 0.010, W_COH = 0.0045;
  const TARGET_R = 4.2, RADIAL_K = 0.00045, HEIGHT_K = 0.00035, CAGE_REPEL_R = 2.4, CAGE_REPEL_K = 0.0025;
  const MAX_SP = 0.030, MIN_SP = 0.010;
  for (let i = 0; i < fishes.length; i++) {
    const f = fishes[i], d = f.userData;
    let sx = 0, sy = 0, sz = 0;                                           // separation accumulator
    let avx = 0, avy = 0, avz = 0;                                        // alignment accumulator (same species)
    let cx = 0, cy = 0, cz = 0;                                           // cohesion accumulator (same species)
    let nSep = 0, nSame = 0;
    for (let j = 0; j < fishes.length; j++) {
      if (i === j) continue;
      const o = fishes[j];
      const dx = f.position.x - o.position.x, dy = f.position.y - o.position.y, dz = f.position.z - o.position.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist > PERCEPTION || dist < 0.001) continue;
      if (dist < SEP_RADIUS) {
        const k = (SEP_RADIUS - dist) / SEP_RADIUS;
        sx += (dx / dist) * k; sy += (dy / dist) * k; sz += (dz / dist) * k; nSep++;
      }
      if (o.userData.speciesIdx === d.speciesIdx) {
        avx += o.userData.velocity.x; avy += o.userData.velocity.y; avz += o.userData.velocity.z;
        cx  += o.position.x; cy  += o.position.y; cz  += o.position.z;
        nSame++;
      }
    }
    const v = d.velocity;
    if (nSep > 0) { v.x += sx * W_SEP; v.y += sy * W_SEP * 0.4; v.z += sz * W_SEP; }
    if (nSame > 0) {
      v.x += (avx/nSame - v.x) * W_ALI;
      v.y += (avy/nSame - v.y) * W_ALI;
      v.z += (avz/nSame - v.z) * W_ALI;
      v.x += (cx/nSame - f.position.x) * W_COH;
      v.y += (cy/nSame - f.position.y) * W_COH * 0.4;
      v.z += (cz/nSame - f.position.z) * W_COH;
    }
    // Gentle reef-orbit attractor: pull toward the ring at radius TARGET_R.
    // Sign: (pr - TARGET_R) > 0 when fish is outside the ring → inward force; < 0 inside → outward force.
    const px = f.position.x - 1.5, pz = f.position.z - 1.5;
    const pr = Math.sqrt(px*px + pz*pz);
    if (pr > 0.01) {
      const radial = (pr - TARGET_R) * RADIAL_K;
      v.x -= (px / pr) * radial; v.z -= (pz / pr) * radial;
    }
    // Hard outer boundary: any fish that drifted far gets a strong inward correction so we never
    // accumulate invisible "lost" fish off-camera that block new spawns via the length cap.
    if (pr > 9.0) {
      v.x -= (px / pr) * 0.012; v.z -= (pz / pr) * 0.012;
    }
    v.y += (1.5 - f.position.y) * HEIGHT_K;
    // Avoid the cage column (radius < 2.4)
    if (pr < CAGE_REPEL_R && pr > 0.01) {
      const k = (CAGE_REPEL_R - pr) * CAGE_REPEL_K;
      v.x += (px / pr) * k * 8; v.z += (pz / pr) * k * 8;
    }
    // Speed clamp
    const sp = v.length();
    if (sp > MAX_SP) v.multiplyScalar(MAX_SP / sp);
    else if (sp < MIN_SP) v.multiplyScalar(MIN_SP / Math.max(sp, 1e-4));
    // Integrate position
    f.position.add(v);
    // Face direction of motion (head along local +X). Yaw from world XZ velocity, gentle pitch from Y velocity.
    const yaw = Math.atan2(-v.z, v.x);
    f.rotation.y = yaw + Math.sin(time * 5 + d.wag) * 0.03;
    const spXZ = Math.sqrt(v.x*v.x + v.z*v.z);
    const pitch = Math.atan2(v.y, spXZ) * 0.7;
    f.rotation.z = pitch;                                                 // roll/pitch around local axes (with yaw applied, this tilts head up/down)
    f.rotation.x = Math.sin(time * 4.2 + d.wag + 0.7) * 0.04;
    // Body undulation: carangiform — front of body rigid, only rear and tail fin wag
    const pos = d.geo.attributes.position, orig = d.orig;
    for (let ix = 0; ix < pos.count; ix++) {
      const x = orig[ix*3], z = orig[ix*3 + 2];
      const tb = Math.max(0, 0.5 - x);                                    // 0 at head, 1 at tail
      const bias = tb * tb * tb * tb;
      const wave = Math.sin(x * 6 - time * 9 + d.wag) * 0.09 * bias;
      pos.setZ(ix, z + wave);
    }
    pos.needsUpdate = true;
  }
}

      0.13 * Math.sin(n.y * 4.6 + n.z * 3.4 + seed) +
      0.07 * Math.cos(n.z * 8.1 + n.x * 7.3 + seed * 0.4) +
      0.035 * Math.sin(n.x * 14 + n.y * 12 + seed * 2.3);

const BEAM_H = 4.6, BEAM_R = 1.45;
const beamConeGeo = new THREE.ConeGeometry(BEAM_R, BEAM_H, 28, 1, true);

function updateUUV(time) {
  // Drive thruster audio:
  //   visibility = max opacity of any UUV currently on-stage (fade in/out)
  //   distance   = world-space distance from camera to the NEAREST visible UUV
  let bestVisibility = 0, nearestDist = Infinity;
  for (let i = uuvs.length - 1; i >= 0; i--) {
    const u = uuvs[i], d = u.userData;
    d.angle += d.speed;
    d.traveled += Math.abs(d.speed);
    u.position.set(1.5 + Math.cos(d.angle) * d.radius, d.height + Math.sin(time * 0.5 + d.bob) * 0.25, 1.5 + Math.sin(d.angle) * d.radius);
    u.rotation.y = -d.angle + (d.speed > 0 ? -Math.PI / 2 : Math.PI / 2);
    // Smooth fade in on arrival / fade out before leaving (no sudden pop)
    let op = d.targetOp;
    if (d.traveled < UUV_FADE) op = d.targetOp * (d.traveled / UUV_FADE);
    else if (d.traveled > UUV_TOTAL - UUV_FADE) op = d.targetOp * Math.max(0, (UUV_TOTAL - d.traveled) / UUV_FADE);
    u.material.opacity = op;
    const f = d.targetOp > 0 ? op / d.targetOp : 0;   // 0..1 fade factor for the headlight
    if (d.spot) d.spot.intensity = d.spotBase * f;
    if (d.beamMat) d.beamMat.uniforms.uOpacity.value = d.beamBase * f;
    if (d.lampMat) d.lampMat.opacity = 0.95 * f;
    // thruster bubbles trail from the tail, tied to distance travelled (sense of motion)
    if (op > 0.35) {
      if (d.lastBubble === undefined) d.lastBubble = d.traveled;
      while (d.traveled - d.lastBubble > 0.03) {
        d.lastBubble += 0.03;
        u.updateMatrixWorld();
        _uuvTail.copy(_uuvTailLocal).applyMatrix4(u.matrixWorld);
        emitThrusterBubble(_uuvTail.x, _uuvTail.y, _uuvTail.z);
      }
    }
    // Audio metering: take the closest visible UUV for the thruster
    if (op > 0.05) {
      const dx = u.position.x - camera.position.x;
      const dy = u.position.y - camera.position.y;
      const dz = u.position.z - camera.position.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (dist < nearestDist) { nearestDist = dist; bestVisibility = Math.max(bestVisibility, op); }
    }
    if (d.traveled > UUV_TOTAL) { scene.remove(u); disposeUUV(u); uuvs.splice(i, 1); }
  }
  setUuvThrusterIntensity(bestVisibility, nearestDist);
}

//     fins running the full mantle but widest at the rear, large green-ringed eye, forward arm bundle ===
const SQ_FAT = 0.86;                        // mantle radial multiplier (robust, ~3:1 mantle)
const SQ_PROF = [[0.155,0],[0.195,0.10],[0.205,0.22],[0.20,0.40],[0.175,0.58],[0.135,0.75],[0.075,0.90],[0.026,1.0]];
function sqMantleR_U(u){ u = Math.max(0, Math.min(1, u)); for (let i=0;i<SQ_PROF.length-1;i++){ const [r0,u0]=SQ_PROF[i],[r1,u1]=SQ_PROF[i+1]; if (u<=u1){ const t=(u-u0)/(u1-u0); return r0+(r1-r0)*t; } } return SQ_PROF[SQ_PROF.length-1][0]; }
function sqMantleRX(x){ return sqMantleR_U(0.5 - x) * SQ_FAT; }   // head at +X (x=+0.5), tail at -X (x=-0.5)
const SQ_FIN = { x0:-0.49, x1:0.34, w:0.25, dihedral:0.13, waveAmp:0.16, waveLen:8.5, waveSpeed:5.0 };
const SQ_ARM = { n:8, baseX:0.55, len:0.38, tentLen:0.5, spread:0.16, baseR:0.06, drop:0.42 };
const SQ_HEADR = 0.15, SQ_HEADX = 0.47, SQ_EYER = 0.058, SQ_EYEX = 0.45, SQ_EYEY = 0.015, SQ_EYEZ = 0.125;
function makeSquidSpeckleTex(){
  const S=256, c=document.createElement('canvas'); c.width=c.height=S; const x=c.getContext('2d');
  x.fillStyle='#ffffff'; x.fillRect(0,0,S,S);
  for (let i=0;i<210;i++){ const px=Math.random()*S, py=Math.random()*S, r=0.7+Math.random()*2.0;
    x.globalAlpha=0.18+Math.random()*0.32; x.fillStyle=`hsl(${8+Math.random()*24} ${45+Math.random()*30}% ${30+Math.random()*25}%)`;
    x.beginPath(); x.arc(px,py,r,0,Math.PI*2); x.fill(); }
  x.globalAlpha=1; const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
const squidSpeckleTex = makeSquidSpeckleTex();
function makeSquidBodyMat(){ return new THREE.MeshPhysicalMaterial({ color:0xeaf3ee, map:squidSpeckleTex, roughness:0.26, metalness:0, transmission:0.85, thickness:0.32, ior:1.34, attenuationColor:0xbfe0d2, attenuationDistance:2.0, iridescence:0.35, iridescenceIOR:1.3, iridescenceThicknessRange:[120,420], transparent:true, opacity:0, side:THREE.FrontSide }); }
function makeSquidFinMat(){ return new THREE.MeshPhysicalMaterial({ color:0xe7f3ef, roughness:0.34, metalness:0, transmission:0.7, thickness:0.12, ior:1.33, iridescence:0.42, iridescenceIOR:1.3, iridescenceThicknessRange:[120,500], transparent:true, opacity:0, side:THREE.DoubleSide, depthWrite:false }); }
function makeSquidEyeMat(){ return new THREE.MeshStandardMaterial({ color:0x0b0f12, roughness:0.2, metalness:0.3, transparent:true, opacity:0 }); }
function makeSquidIrisMat(){ return new THREE.MeshPhysicalMaterial({ color:0x6f9a52, metalness:0.55, roughness:0.3, iridescence:0.6, iridescenceIOR:1.35, iridescenceThicknessRange:[200,560], emissive:0x6f9a52, emissiveIntensity:0.04, transparent:true, opacity:0 }); }
function buildSquidMantleGeo(){ const pts=SQ_PROF.map(([r,u])=>new THREE.Vector2(r*SQ_FAT,u)); const g=new THREE.LatheGeometry(pts,22); g.translate(0,-0.5,0); g.rotateZ(Math.PI/2); return g; }
const squidMantleGeoS = buildSquidMantleGeo();
const squidArmsGeoS = buildSquidArms();
const squidHeadGeoS = (()=>{ const g=new THREE.SphereGeometry(SQ_HEADR,20,16); g.scale(1.25,1,1); return g; })();
const squidEyeGeoS = new THREE.SphereGeometry(SQ_EYER,14,14);
const squidIrisRingGeoS = new THREE.TorusGeometry(SQ_EYER*1.02, SQ_EYER*0.16, 8, 22);
const squidIrisPatchGeoS = new THREE.SphereGeometry(SQ_EYER*0.5, 8, 8);
// two lateral fin ribbons hugging the mantle; thin at the front, widest near the rear (posterior lobes)
function buildSquidFinGeo() {
  const segX = 26, segZ = 5, x0 = SQ_FIN.x0, x1 = SQ_FIN.x1, len = x1 - x0;
  const pos = [], uv = [], idx = []; let base = 0;
  for (const side of [1, -1]) {
    const start = base;
    for (let ix = 0; ix <= segX; ix++) {
      const fx = ix / segX, x = x0 + fx * len;                       // fx: 0 = rear/tail, 1 = front/head
      const inner = sqMantleRX(x) * 0.92;
      const shape = Math.pow(fx, 0.55) * Math.pow(1 - fx, 1.35) / 0.319; // widest near fx≈0.28
      const hw = SQ_FIN.w * shape;
      for (let iz = 0; iz <= segZ; iz++) { const fz = iz / segZ; const z = side * (inner + hw * fz); pos.push(x, 0, z); uv.push(fx, fz); }
    }
    const cols = segZ + 1;
    for (let ix = 0; ix < segX; ix++) for (let iz = 0; iz < segZ; iz++) {
      const a = start + ix * cols + iz, b = a + cols;
      if (side === 1) idx.push(a, b, a + 1, a + 1, b, b + 1);
      else idx.push(a, a + 1, b, a + 1, b + 1, b);
    }
    base += (segX + 1) * (segZ + 1);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}
// soft tapering tubes swept along a curved centreline (built in squid-local space, head at +X)
function sqTubeFromCenterline(c, radii, RING) {
  const pos = [], uv = [], idx = [], up0 = new THREE.Vector3(0, 1, 0);
  for (let s = 0; s < c.length; s++) {
    const tan = (s < c.length - 1 ? c[s + 1].clone().sub(c[s]) : c[s].clone().sub(c[s - 1])).normalize();
    let nx = up0.clone().cross(tan); if (nx.lengthSq() < 1e-6) nx = new THREE.Vector3(1, 0, 0); nx.normalize();
    const ny = tan.clone().cross(nx).normalize();
    for (let k = 0; k < RING; k++) {
      const a = (k / RING) * Math.PI * 2, r = radii[s];
      pos.push(c[s].x + (nx.x * Math.cos(a) + ny.x * Math.sin(a)) * r,
               c[s].y + (nx.y * Math.cos(a) + ny.y * Math.sin(a)) * r,
               c[s].z + (nx.z * Math.cos(a) + ny.z * Math.sin(a)) * r);
      uv.push(s / (c.length - 1), k / RING);
    }
  }
  for (let s = 0; s < c.length - 1; s++) for (let k = 0; k < RING; k++) {
    const a = s * RING + k, b = a + RING, an = s * RING + (k + 1) % RING, bn = an + RING;
    idx.push(a, b, an, an, b, bn);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  g.setIndex(idx); g.computeVertexNormals(); return g;
}
function buildSquidArm(base, rad, len, baseR, fan, droop, wig) {
  const SEG = 12, RING = 8, c = [], radii = [];
  for (let s = 0; s <= SEG; s++) {
    const f = s / SEG, out = fan * len * f;
    const x = base.x + len * f;
    const y = base.y + rad.y * out - droop * len * f * f;             // quadratic downward curl
    const z = base.z + rad.z * out + Math.sin(f * 3.2 + wig) * 0.012 * f;
    c.push(new THREE.Vector3(x, y, z));
    radii.push(baseR * (1 - f * f * 0.82) + 0.004);                   // full base -> soft fine tip
  }
  return sqTubeFromCenterline(c, radii, RING);
}
function buildSquidArms() {
  const parts = [], ringR = SQ_HEADR * 0.42;
  for (let i = 0; i < SQ_ARM.n; i++) {
    const ang = (i / SQ_ARM.n) * Math.PI * 2, rad = new THREE.Vector3(0, Math.sin(ang), Math.cos(ang));
    const base = new THREE.Vector3(SQ_ARM.baseX, rad.y * ringR, rad.z * ringR);
    parts.push(buildSquidArm(base, rad, SQ_ARM.len * (0.88 + (i % 3) * 0.09), SQ_ARM.baseR, SQ_ARM.spread, SQ_ARM.drop, i * 1.7));
  }
  for (const sgn of [1, -1]) {                                        // 2 longer feeding tentacles at the sides
    const rad = new THREE.Vector3(0, -0.15, sgn);
    const base = new THREE.Vector3(SQ_ARM.baseX, -0.01, sgn * ringR * 0.5);
    parts.push(buildSquidArm(base, rad, SQ_ARM.tentLen, SQ_ARM.baseR * 0.62, SQ_ARM.spread * 0.5, SQ_ARM.drop * 0.7, sgn));
  }
  return mergeGeometries(parts);
}
const squids = [];
function createSquid() {
  const g = new THREE.Group();
  const bodyMat = makeSquidBodyMat();
  const mantle = new THREE.Mesh(squidMantleGeoS, bodyMat); g.add(mantle);
  const finGeo = buildSquidFinGeo();
  const finMat = makeSquidFinMat();
  g.add(new THREE.Mesh(finGeo, finMat));
  const head = new THREE.Mesh(squidHeadGeoS, bodyMat); head.position.set(SQ_HEADX, 0, 0); g.add(head);
  const arms = new THREE.Mesh(squidArmsGeoS, bodyMat); g.add(arms);
  const eyeM = makeSquidEyeMat(), irisM = makeSquidIrisMat();
  for (const sgn of [1, -1]) {
    const eye = new THREE.Mesh(squidEyeGeoS, eyeM); eye.position.set(SQ_EYEX, SQ_EYEY, SQ_EYEZ * sgn); g.add(eye);
    const ring = new THREE.Mesh(squidIrisRingGeoS, irisM);
    ring.position.set(SQ_EYEX + 0.01, SQ_EYEY, SQ_EYEZ * sgn);
    ring.lookAt(SQ_EYEX + sgn * 0.3, SQ_EYEY, SQ_EYEZ * sgn + sgn); g.add(ring);
    const patch = new THREE.Mesh(squidIrisPatchGeoS, irisM);
    patch.position.set(SQ_EYEX + 0.015, SQ_EYEY + SQ_EYER * 1.05, SQ_EYEZ * sgn * 0.95);
    patch.scale.set(1.7, 0.55, 1); g.add(patch);
  }
  // faithful size: mantle length ≈ 28–45 cm (1 m = 1.11 world units, and the model mantle is 1.0 unit)
  g.scale.setScalar(0.31 + Math.random() * 0.19);
  g.userData = {
    finGeo, arms,
    fadeMats: [{ m: bodyMat, o: 1.0 }, { m: finMat, o: 0.62 }, { m: eyeM, o: 1.0 }, { m: irisM, o: 1.0 }],
    angle: Math.random() * 6.28, radius: 3 + Math.random() * 3, height: 1.4 + Math.random() * 2.4,
    speed: (0.0022 + Math.random() * 0.0016) * (Math.random() < 0.5 ? 1 : -1), bob: Math.random() * 6.28, ph: Math.random() * 6.28, fadeT: 0,
  };
